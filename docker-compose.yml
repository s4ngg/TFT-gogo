services:
  mysql:
    image: mysql:8.0
    container_name: tftgogo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tftgogo}
      MYSQL_USER: ${MYSQL_USER:-tftuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tftpass}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: tftgogo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: tftgogo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tftgogo_ai}
      POSTGRES_USER: ${POSTGRES_USER:-tftuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tftpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tftgogo-backend
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-tftgogo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-tftuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-tftpass}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "false"
      SPRING_FLYWAY_LOCATIONS: ${SPRING_FLYWAY_LOCATIONS:-classpath:db/migration}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RIOT_API_KEY: ${RIOT_API_KEY:-local-smoke-disabled}
      APP_META_DECK_STARTUP_AGGREGATE: "false"
      APP_GUIDE_CDRAGON_ENABLED: ${APP_GUIDE_CDRAGON_ENABLED:-false}
      APP_GUIDE_CDRAGON_STARTUP_IMPORT: ${APP_GUIDE_CDRAGON_STARTUP_IMPORT:-false}
      APP_GUIDE_CDRAGON_PATCH_VERSION: ${APP_GUIDE_CDRAGON_PATCH_VERSION:-latest}
      APP_GUIDE_CDRAGON_INCLUDE_CHAMPIONS: ${APP_GUIDE_CDRAGON_INCLUDE_CHAMPIONS:-true}
      APP_GUIDE_CDRAGON_INCLUDE_TRAITS: ${APP_GUIDE_CDRAGON_INCLUDE_TRAITS:-true}
      APP_GUIDE_CDRAGON_INCLUDE_ITEMS: ${APP_GUIDE_CDRAGON_INCLUDE_ITEMS:-true}
      APP_GUIDE_CDRAGON_INCLUDE_AUGMENTS: ${APP_GUIDE_CDRAGON_INCLUDE_AUGMENTS:-true}
      APP_PATCH_NOTE_CRAWLER_MIN_RETAINED_ROW_RATIO: ${APP_PATCH_NOTE_CRAWLER_MIN_RETAINED_ROW_RATIO:-0.5}
      APP_PATCH_NOTE_SCHEDULER_ENABLED: ${APP_PATCH_NOTE_SCHEDULER_ENABLED:-false}
      APP_PATCH_NOTE_SCHEDULER_STARTUP_IMPORT: ${APP_PATCH_NOTE_SCHEDULER_STARTUP_IMPORT:-false}
      APP_PATCH_NOTE_SCHEDULER_LOCALE: ${APP_PATCH_NOTE_SCHEDULER_LOCALE:-ko-kr}
      APP_PATCH_NOTE_SCHEDULER_CURRENT: ${APP_PATCH_NOTE_SCHEDULER_CURRENT:-true}
      APP_OAUTH2_AUTHORIZATION_BASE_URI: ${APP_OAUTH2_AUTHORIZATION_BASE_URI:-http://localhost:8081}
      APP_OAUTH2_AUTHORIZED_REDIRECT_URI: ${APP_OAUTH2_AUTHORIZED_REDIRECT_URI:-http://localhost:3000/oauth/callback}
      APP_OAUTH2_LOGIN_FAILURE_REDIRECT_URI: ${APP_OAUTH2_LOGIN_FAILURE_REDIRECT_URI:-http://localhost:3000/login}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,https://tftgogo.com,https://www.tftgogo.com}
      AI_SERVER_URL: ${AI_SERVER_URL:-http://ai-server:8000}
      AI_SERVER_INTERNAL_SECRET: ${AI_SERVER_INTERNAL_SECRET:-dev-internal-secret}
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      JWT_SECRET: ${JWT_SECRET:-local-jwt-secret-key-for-tft-gogo-dev-123456}
      JWT_ACCESS_TOKEN_EXPIRATION_MILLIS: ${JWT_ACCESS_TOKEN_EXPIRATION_MILLIS:-3600000}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: tftgogo-ai
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${AI_SERVER_APP_ENV:-development}
      INTERNAL_SECRET: ${AI_SERVER_INTERNAL_SECRET:-dev-internal-secret}
      # compose가 postgres 서비스에 붙일 기본 접속 문자열. ai-server/.env의
      # DATABASE_URL은 environment:가 항상 이겨서 무시되므로, docker compose
      # 실행에서 접속 정보를 바꾸려면 이 AI_SERVER_DATABASE_URL을 셸/루트 .env에서
      # 지정한다 (ai-server를 컨테이너 밖에서 직접 돌릴 때만 ai-server/.env가 적용됨).
      DATABASE_URL: ${AI_SERVER_DATABASE_URL:-postgresql+asyncpg://tftuser:tftpass@postgres:5432/tftgogo_ai}
    env_file:
      - path: ./ai-server/.env
        required: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tftgogo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ai-server

volumes:
  mysql-data:
  postgres-data:
