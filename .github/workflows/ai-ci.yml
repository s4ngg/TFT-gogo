name: AI Server CI

on:
  push:
    paths:
      - 'ai-server/**'
  pull_request:
    paths:
      - 'ai-server/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ai-server
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          cd ai-server
          pip install ruff
          ruff check .

      - name: Run tests
        run: |
          cd ai-server
          pip install pytest
          pytest
