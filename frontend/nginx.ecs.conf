server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # These routes must be handled by the backend target group at the ALB layer.
    location = /api {
        default_type text/plain;
        return 502 "Misrouted /api request. ALB must route /api to the backend target group.\n";
    }

    location /api/ {
        default_type text/plain;
        return 502 "Misrouted /api/* request. ALB must route /api/* to the backend target group.\n";
    }

    location = /oauth2 {
        default_type text/plain;
        return 502 "Misrouted /oauth2 request. ALB must route OAuth paths to the backend target group.\n";
    }

    location /oauth2/ {
        default_type text/plain;
        return 502 "Misrouted /oauth2/* request. ALB must route OAuth paths to the backend target group.\n";
    }

    location = /login/oauth2 {
        default_type text/plain;
        return 502 "Misrouted /login/oauth2 request. ALB must route OAuth callback paths to the backend target group.\n";
    }

    location /login/oauth2/ {
        default_type text/plain;
        return 502 "Misrouted /login/oauth2/* request. ALB must route OAuth callback paths to the backend target group.\n";
    }

    location = /swagger-ui.html {
        default_type text/plain;
        return 502 "Misrouted /swagger-ui.html request. ALB must route backend docs paths to the backend target group.\n";
    }

    location /swagger-ui/ {
        default_type text/plain;
        return 502 "Misrouted /swagger-ui/* request. ALB must route backend docs paths to the backend target group.\n";
    }

    location = /v3/api-docs {
        default_type text/plain;
        return 502 "Misrouted /v3/api-docs request. ALB must route backend docs paths to the backend target group.\n";
    }

    location /v3/api-docs/ {
        default_type text/plain;
        return 502 "Misrouted /v3/api-docs/* request. ALB must route backend docs paths to the backend target group.\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
