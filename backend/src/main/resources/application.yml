spring:
  application:
    name: tftgogo-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tftgogo?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${SERVER_PORT:8080}

# ── Riot API ──────────────────────────────
riot:
  api:
    key: ${RIOT_API_KEY}
    base-url:
      kr:    https://kr.api.riotgames.com
      asia:  https://asia.api.riotgames.com
    rate-limit:
      per-second: 20
      per-2-minutes: 100

# ── JWT ───────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  access-expiry-ms: 1800000       # 30분
  refresh-expiry-ms: 604800000    # 7일

# ── OpenAI ────────────────────────────────
openai:
  api:
    key: ${OPENAI_API_KEY:}

# ── Community Dragon (CDragon) ─────────────
cdragon:
  base-url: https://raw.communitydragon.org/latest

# ── 로깅 ──────────────────────────────────
logging:
  level:
    com.tftgogo: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
